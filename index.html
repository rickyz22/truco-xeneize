<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Truco Profesional</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a1f44">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- PANTALLA DE INICIO -->
    <div id="pantalla-inicio">
        <div class="logo-inicio">
            <!-- Botones Pro -->
            <div class="botones-stack">
                <button id="btn-empezar" onclick="comenzarJuego()">
                    <span class="material-icons">play_arrow</span> JUGAR AHORA
                </button>
                <button class="btn-config-inicio" onclick="abrirConfiguracion()">
                    <span class="material-icons">settings</span> AJUSTES
                </button>
            </div>
        </div>
    </div>
    
    <!-- PANTALLA DE CONFIGURACIÓN (Mantenemos el diseño que te gustó) -->
    <div id="pantalla-config" style="display: none;">
        <div class="config-content">
            <div class="config-header">
                <h3><span class="material-icons">settings</span> AJUSTES</h3>
                <button class="btn-cerrar-x" onclick="cerrarConfig()">
                    <span class="material-icons">close</span>
                </button>
            </div>
            <div class="config-scrollable">
                <div class="seccion-config">
                    <h4>ESTILO DE JUEGO</h4>
                    <div class="grid-equipos">
                        <button class="btn-equipo boca" onclick="cambiarEstilo('boca')">BOCA</button>
                        <button class="btn-equipo river" onclick="cambiarEstilo('river')">RIVER</button>
                        <button class="btn-equipo racing" onclick="cambiarEstilo('racing')">RACING</button>
                        <button class="btn-equipo independiente" onclick="cambiarEstilo('independiente')">ROJO</button>
                        <button class="btn-equipo sanlorenzo" onclick="cambiarEstilo('sanlorenzo')">CASLA</button>
                        <button class="btn-equipo clasico" onclick="cambiarEstilo('clasico')">TRADICIONAL</button>
                    </div>
                </div>
                <div class="seccion-config">
                    <h4>PREFERENCIAS</h4>
                    <div class="lista-toggles">
                        <div class="toggle-item">
                            <div class="toggle-info"><span class="material-icons">timer</span><span>Cronómetro</span></div>
                            <label class="switch"><input type="checkbox" id="check-crono" checked onchange="toggleElemento('crono')"><span class="slider round"></span></label>
                        </div>
                        <div class="toggle-item">
                            <div class="toggle-info"><span class="material-icons">pin</span><span>Marcador Digital</span></div>
                            <label class="switch"><input type="checkbox" id="check-num" checked onchange="toggleElemento('num')"><span class="slider round"></span></label>
                        </div>
                        <div class="toggle-item">
                            <div class="toggle-info"><span class="material-icons" id="icon-sonido">volume_up</span><span>Sonido</span></div>
                            <label class="switch"><input type="checkbox" id="check-sonido" checked onchange="toggleElemento('sonido')"><span class="slider round"></span></label>
                        </div>
                    </div>
                </div>
                <div class="seccion-config">
                    <h4>HISTORIAL</h4>
                    <div id="lista-historial"></div>
                    <button class="btn-borrar-todo" onclick="reiniciarHistorial()"><span class="material-icons">delete_sweep</span> BORRAR TODO</button>
                </div>
            </div>
            <div class="config-footer">
                <button class="btn-guardar-pro" onclick="cerrarConfig()">GUARDAR CAMBIOS</button>
            </div>
        </div>
    </div>

    <!-- CONTENIDO DEL JUEGO -->
    <div id="contenido-juego" style="display: none;">
        <button id="btn-config" onclick="abrirConfiguracion()"><span class="material-icons">settings</span></button>
        <button id="btn-home" onclick="volverInicio()"><span class="material-icons">home</span></button>
        <header class="marcador-futbol">
            <div class="bloque-led" id="cont-nos">
                <span class="etiqueta">NOS</span>
                <div class="led-display"><span id="num-nos">0</span></div>
            </div>
            <div class="seccion-cronometro" id="cont-crono">
                <div id="cronometro">00:00</div>
                <div class="controles-crono">
                    <button id="btn-play-pause" onclick="toggleCronometro()"><span class="material-icons" id="icono-play">play_arrow</span></button>
                    <button onclick="resetearCronometro()"><span class="material-icons">replay</span></button>
                </div>
            </div>
            <div class="bloque-led" id="cont-ellos">
                <span class="etiqueta">ELLOS</span>
                <div class="led-display"><span id="num-ellos">0</span></div>
            </div>
        </header>
        <main class="zona-juego">
            <section class="columna">
                <h2>NOSOTROS</h2>
                <div id="palitos-nos" class="contenedor-palitos"></div>
                <div class="controles">
                    <button class="btn-sumar" onclick="sumar('nos')">+</button>
                    <button class="btn-restar" onclick="restar('nos')">-</button>
                </div>
            </section>
            <section class="columna">
                <h2>ELLOS</h2>
                <div id="palitos-ellos" class="contenedor-palitos"></div>
                <div class="controles">
                    <button class="btn-sumar" onclick="sumar('ellos')">+</button>
                    <button class="btn-restar" onclick="restar('ellos')">-</button>
                </div>
            </section>
        </main>
        <button id="reset-btn" onclick="reiniciar()">NUEVA PARTIDA</button>
    </div>
    
    <div id="modal-custom" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3 id="modal-titulo"></h3>
            <p id="modal-mensaje"></p>
            <div id="modal-botones" class="modal-botones-container"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
