<!DOCTYPE html><html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Truco Profesional</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a1f44">

    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="pantalla-inicio">
        <div class="logo-inicio">
            <button id="btn-empezar" onclick="comenzarJuego()">EMPEZAR PARTIDA</button>
            <br><br>
            <button class="btn-config-inicio" onclick="abrirConfiguracion()">CONFIGURACIÓN</button>
        </div>
    </div>
    
    <div id="pantalla-config" style="display: none;">
        <div class="config-content">
            <h3>AJUSTES</h3>
            <div class="seccion-config">
                <h4>ESTILO DE JUEGO</h4>
                <div class="grid-equipos">
                    <button onclick="cambiarEstilo('boca')">BOCA</button>
                    <button onclick="cambiarEstilo('river')">RIVER</button>
                    <button onclick="cambiarEstilo('racing')">RACING</button>
                    <button onclick="cambiarEstilo('independiente')">ROJO</button>
                    <button onclick="cambiarEstilo('sanlorenzo')">CASLA</button>
                    <button onclick="cambiarEstilo('clasico')" style="grid-column: span 2;">TRUCO CLÁSICO</button>
                </div>
            </div>
            <div class="seccion-config">
                <h4>ELEMENTOS</h4>
                <label class="toggle-switch">
                    <input type="checkbox" id="check-crono" checked onchange="toggleElemento('crono')"> Cronómetro
                </label>
                <label class="toggle-switch">
                    <input type="checkbox" id="check-num" checked onchange="toggleElemento('num')"> Marcador
                </label>
                <!-- AGREGADO: Switch de sonido -->
                <label class="toggle-switch">
                    <input type="checkbox" id="check-sonido" checked onchange="toggleElemento('sonido')"> Sonido
                </label>
            </div>
            <div class="seccion-config">
                <h4>HISTORIAL</h4>
                <div id="lista-historial"></div>
                <button class="btn-reiniciar-historial" onclick="reiniciarHistorial()">REINICIAR HISTORIAL</button>
            </div>
            <!-- AGREGADO: Botón Volver junto a Guardar -->
            <div style="display: flex; gap: 10px; width: 100%;">
                <button class="btn-cerrar-config" onclick="cerrarConfig()" style="background: #666;">VOLVER</button>
                <button class="btn-cerrar-config" onclick="cerrarConfig()">GUARDAR</button>
            </div>
        </div>
    </div>

    <div id="contenido-juego" style="display: none;">
        <button id="btn-config" onclick="abrirConfiguracion()"><span class="material-icons">settings</span></button>
        <button id="btn-home" onclick="volverInicio()"><span class="material-icons">home</span></button>

        <header class="marcador-futbol">
            <div class="bloque-led" id="cont-nos">
                <span class="etiqueta">NOS</span>
                <div class="led-display"><span id="num-nos">0</span></div>
            </div>

            <div class="seccion-cronometro" id="cont-crono">
                <div id="cronometro">00:00</div>
                <div class="controles-crono">
                    <button id="btn-play-pause" onclick="toggleCronometro()">
                        <span class="material-icons" id="icono-play">play_arrow</span>
                    </button>
                    <button onclick="resetearCronometro()">
                        <span class="material-icons">replay</span>
                    </button>
                </div>
            </div>

            <div class="bloque-led" id="cont-ellos">
                <span class="etiqueta">ELLOS</span>
                <div class="led-display"><span id="num-ellos">0</span></div>
            </div>
        </header>

        <main class="zona-juego">
            <section class="columna">
                <h2>NOSOTROS</h2>
                <div id="palitos-nos" class="contenedor-palitos"></div>
                <div class="controles">
                    <button class="btn-sumar" onclick="sumar('nos')">+</button>
                    <button class="btn-restar" onclick="restar('nos')">-</button>
                </div>
            </section>

            <section class="columna">
                <h2>ELLOS</h2>
                <div id="palitos-ellos" class="contenedor-palitos"></div>
                <div class="controles">
                    <button class="btn-sumar" onclick="sumar('ellos')">+</button>
                    <button class="btn-restar" onclick="restar('ellos')">-</button>
                </div>
            </section>
        </main>

        <button id="reset-btn" onclick="reiniciar()">NUEVA PARTIDA</button>
    </div>
    
    <div id="modal-custom" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3 id="modal-titulo"></h3>
            <p id="modal-mensaje"></p>
            <div id="modal-botones" class="modal-botones-container"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
